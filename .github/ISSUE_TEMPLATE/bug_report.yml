name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out each section below.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps that reliably reproduce the issue.
      placeholder: |
        1. Add the following to `commitguard.yaml` …
        2. Run `npx commitguard install`
        3. Make a commit
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include the full error output / stack trace if available.
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: commitguard.yaml
      description: Paste your `commitguard.yaml` (redact anything sensitive).
      render: yaml

  - type: input
    id: commitguard_version
    attributes:
      label: commitguard version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: runtime_version
    attributes:
      label: Node.js / Bun version
      description: Output of `node --version` or `bun --version`.
      placeholder: "v22.x.x / bun 1.x.x"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15, Ubuntu 24.04, Windows 11…"
    validations:
      required: true
