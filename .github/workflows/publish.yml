name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for npm provenance
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # setup-node is required so npm can pick up NODE_AUTH_TOKEN for registry auth
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          # NPM_TOKEN: generate an Automation token at npmjs.com → Profile → Access Tokens,
          # then add it as a repository secret at Settings → Secrets and variables → Actions.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
